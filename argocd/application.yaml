apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: webapp
  namespace: argocd
spec:
  project: webapp-kubernetes

  source:
    repoURL: https://github.com/maikereis/web-app-infra.git
    targetRevision: master
    path: app/base

  destination:
    server: https://kubernetes.default.svc
    namespace: app

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
